<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Tạo Strips Hover Effect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Bao quanh toàn bộ các dải strip -->
<div class="container">
    <!-- Mỗi .strip đại diện cho một dải nội dung với màu sắc riêng -->
    <div class="strip strip--1">
        <h2>Relax</h2>
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&h=600&fit=crop" alt="">
        <div class="overlay"></div>
    </div>
<div class="strip strip--2">
    <h2>Explore</h2>
    <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&h=600&fit=crop" alt="">
    <div class="overlay"></div>
</div>
<div class="strip strip--3">
    <h2>Travel</h2>
    <img src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=800&h=600&fit=crop" alt="">
    <div class="overlay"></div>
</div>
<div class="strip strip--4">
    <h2>Achieve</h2>
    <img src="https://images.unsplash.com/photo-1484589065579-248aad0d8b13?w=800&h=600&fit=crop" alt="">
    <div class="overlay"></div>
</div>
<div class="strip strip--5">
    <h2>Dare</h2>
    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop" alt="">
    <div class="overlay"></div>
</div>
</div>
</body>
</html>
