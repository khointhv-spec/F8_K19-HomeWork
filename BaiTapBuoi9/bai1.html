<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Các hình có thể tạo với Border</title>
    <style>
        .square {
            width: 50px;
            height: 50px;
            border: 3px solid red;
        }

        .rectangle {
            width: 100px;
            height: 50px;
            border: 3px solid deepskyblue;
        }

        .triangle-up {
            width: 0;
            border-right: 50px solid transparent;
            border-bottom: 70px solid mediumseagreen;
            border-left: 50px solid transparent;
        }

        .triangle-down {
            width: 0;
            border-right: 50px solid transparent;
            border-top: 70px solid goldenrod;
            border-left: 50px solid transparent;
        }

        .triangle-left {
            width: 0;
            border-top: 50px solid transparent;
            border-right: 70px solid mediumpurple;
            border-bottom: 50px solid transparent;
        }

        .triangle-right {
            width: 0;
            border-top: 50px solid transparent;
            border-left: 70px solid darkgoldenrod;
            border-bottom: 50px solid transparent;
        }

        .trapezium {
            width: 100px;
            border-right: 50px solid transparent;
            border-left: 50px solid transparent;
            border-bottom: 70px solid darkseagreen;
        }

        .triangle-big {
            width: 0;
            /*height: 20px;*/
            border-bottom: 50px solid #4b5563;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
        }

        .triangle-2 {
            width: 0;
            border-bottom: 100px solid #883c02;
            border-right: 20px solid transparent;
            border-left: 20px solid transparent;
        }

        .triangle-3 {
            width: 0;
            border-bottom: 50px solid #cc5c05;
            border-right: 50px solid transparent;
            border-left: 50px solid transparent;
        }
        .arrow-right {
            width: 0;
            border-bottom: 20px solid transparent;
            border-top: 20px solid transparent;
            border-left: 120px solid mediumseagreen;
        }
        .arrow-left {
            width: 0;
            border-bottom: 20px solid transparent;
            border-top: 20px solid transparent;
            border-right: 120px solid rebeccapurple;
        }
        .flag-ribbon {
            width: 100px;
            height: 0;
            border-top: 50px solid #e85403;
            border-left:50px solid #e85403;
            border-bottom: 50px solid #e85403;
            border-right: 50px solid transparent;
        }
        .f8-1 {
            display: inline-block;
            width: 25px;
            border-bottom: 150px solid orangered;
        }

        .f8-2 {
            display: inline-block;
            width: 75px;
            border-bottom: 25px solid orangered;
            margin-bottom: 125px;
            margin-left: -5px;
        }

        .f8-3 {
            display: inline-block;
            width: 75px;
            border-bottom: 25px solid orangered;
            margin-bottom: 60px;
            margin-left: -80px;
        }

        .f8-4 {
            display: inline-block;
            width:60px;
            height: 100px;
            border: 25px solid orangered;
        }
        .f8-5 {
            display: inline-block;
            width: 75px;
            border-bottom: 25px solid orangered;
            margin-bottom: 60px;
            margin-left: -100px;
        }
    </style>
</head>
<body>
<h1>Các hình có thể tạo với Border</h1>
<p>1.Hình vuông</p>
<div class="square"></div>

<p>2.Hình chữ nhật</p>
<div class="rectangle"></div>

<p>3.Tam giác lên</p>
<div class="triangle-up"></div>

<p>4.Tam giác xuống</p>
<div class="triangle-down"></div>

<p>5.Tam giác trái</p>
<div class="triangle-left"></div>

<p>6.Tam giác phải</p>
<div class="triangle-right"></div>

<p>7.Hình thang</p>
<div class="trapezium"></div>

<p>8.Tam giác rộng</p>
<div class="triangle-big"></div>

<p>9.Tam giác nhọn</p>
<div class="triangle-2"></div>

<p>10.Tam giác cân</p>
<div class="triangle-3"></div>

<p>11.Mũi tên phải</p>
<div class="arrow-right"></div>

<p>12.Mũi tên trái</p>
<div class="arrow-left"></div>

<p>13.Lá cờ</p>
<div class="flag-ribbon"></div>
<p>14.F8</p>
<div class="f8-1"></div>
<div class="f8-2"></div>
<div class="f8-3"></div>
<div class="f8-4"></div>
<div class="f8-5"></div>
</body>
</html>
