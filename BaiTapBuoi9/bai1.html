<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="baitap1.css">
    <title>Các hình có thể tạo với Border</title>
</head>
<body>
<h1>Các hình có thể tạo với Border</h1>
<p>1.Hình vuông</p>
<div class="square"></div>

<p>2.Hình chữ nhật</p>
<div class="rectangle"></div>

<p>3.Tam giác lên</p>
<div class="triangle-up"></div>

<p>4.Tam giác xuống</p>
<div class="triangle-down"></div>

<p>5.Tam giác trái</p>
<div class="triangle-left"></div>

<p>6.Tam giác phải</p>
<div class="triangle-right"></div>

<p>7.Hình thang</p>
<div class="trapezium"></div>

<p>8.Tam giác rộng</p>
<div class="triangle-big"></div>

<p>9.Tam giác nhọn</p>
<div class="triangle-2"></div>

<p>10.Tam giác cân</p>
<div class="triangle-3"></div>

<p>11.Mũi tên phải</p>
<div class="arrow-right"></div>

<p>12.Mũi tên trái</p>
<div class="arrow-left"></div>

<p>13.Lá cờ</p>
<div class="flag-ribbon"></div>
<p>14.F8</p>
<div class="f8-1"></div>
<div class="f8-2"></div>
<div class="f8-3"></div>
<div class="f8-4"></div>
<div class="f8-5"></div>
</body>
</html>
