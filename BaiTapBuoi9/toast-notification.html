<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        /*/ CSS acction toast/ */
        #toast-toggle:checked ~ .toast {
            display: inline-block;
        }

        .open-btn {
            /*CSS Notification*/
            display: inline-block;
            background-color: #2e2d2d;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
        }

        .toast {
            /* Ẩn mặc định khi tải trang */
            display: none;
            background-color: #65dd65;
            color: #fff;
            padding: 10px 20px;
        }

        .close-btn {
            /*CSS close button*/
            display: inline-block;
            padding: 7px;
            background-color: #616060;
            cursor: pointer;
        }
    </style>
    <title>Toast thông báo</title>
</head>
<body>
<input type="checkbox" id="toast-toggle" hidden>
<label for="toast-toggle" class="open-btn">Hiện thông báo</label>
<div class="toast">
    <span> 🎉 Lưu thành công!</span>
    <label for="toast-toggle" class="close-btn">x</label>

</div>
</body>
</html>
