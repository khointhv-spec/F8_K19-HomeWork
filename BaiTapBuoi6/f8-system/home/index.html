<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HOME PAGE</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>
<!--h1 va h2 có class="title" nhưng màu khác  bời vì h2 có thêm id là #main vì id có độ ưu tiên cao hơn nên sẽ có màu khác-->
<h1 class="title" id="main">HOME PAGE</h1>
<h2 class="title">Gioi thieu he thong</h2>
<!--<h2 class="title"> — phần tử này bị override bởi theme.css-->
<h3 class="section">Cac khoa hoc noi bat</h3>
<!--h3 co class="section" dùng external css nên sẽ bị tác động đổi thành color:Purple-->
<p style="color: red">HTML</p>
<p style="color: yellow">CSS</p>
<p style="color: chartreuse">Javascript</p>
<p style="color: coral">Python</p>
<!--tat ca tag p dùng inline css vi inline css co do uu tien cao nhat nen se khong bi anh huong boi external css -->
</body>
</html>
