<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>REPORTS PAGE</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>
<h1>REPORTS PAGE</h1>
<!--h1 dung external css nen se co color="red"-->
<h2 class="title">Thong ke he thong</h2>
<!--h2.class="title" dung internal css nen se co color="teal"-->
<div class="section" id="main">
    <!--
      Phan tu nay co: tag(div) + class(.section) + id(#main)
      Selector thang: id vi id co do uu tien hon class
      Mau hien thi: pink
    -->
    <p class="title">Tong so hoc vien</p>
    <!--the p .class="title" co color="teal" vi dung external css-->
    <p class="big">Tong so khoa hoc</p>
    <!-- the p .class="big" co color="brown vi dung external css"-->
    <p>Tong so don hang</p>
    <!--the p co color="maroon" vi dung external css-->
    <p class="highlight">Doanh thu</p>
    <!--the p .class="highlight" co color="gold" vi dung external css-->
</div>
</body>
</html>
