<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>STUDENTS PAGE</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <style>
        .big {
            color: black;
        }
    </style>
</head>
<body>
<h1 id="main">STUDENTS PAGE</h1>
<!--h1 dung id(#main) nen se hien thi color="pink"-->
<h2 class="title">Danh sach hoc vien</h2>
<h3 class="title">Nhom 1:</h3>
<!--Có đúng 3 phần tử dùng .title (h2 + 2 h3) nen ca 3 the deu co color="teal" giong nhau-->
<p class="highlight">Nguyen Van A</p>
<p class="highlight">Tran Van B</p>
<h3 class="title">Nhom 2:</h3>
<p class="highlight">Le Van C</p>
<p class="highlight">Pham Van D</p>
<!--<p class="highlight"> co 4 muc nhu nhau va hien thi cung mot color:gold-->
<p class="big">Ngo Thi E</p>
<!--tao mot ten bat ki voi class .big -->
<!--p.big co color="black" vi dung internal css duoc viet sau nen se thay doi color:black-->
</body>
</html>
