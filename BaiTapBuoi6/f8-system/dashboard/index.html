<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>DASHBOARD PAGE</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <style>
        #special {
            color: blue;
            font-size: 50px;
            text-align: center;
        }

        h2.section {
            background-color: #ccc;
            font-size: 30px;
            text-align: center;
        }

        .title {
            color: aqua;
            font-size: 20px;
            background-color: #ccc;
        }

        .highlight {
            font-size: 20px;
            color: red;
        }

        .big {
            font-size: 30px;
            color: green;
            background-color: #ccc;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="big">
    <h1 class="title" id="special" style="color: black">DASHBOARD PAGE</h1>
    <!--
  Phan tu nay co: tag(h1) + class(.title) + id(#special) + inline style
  Selector thang:inline style vi css inline co do uu tien cao nhat o day???
  Mau hien thi: black
-->
    <h2 class="section">Tong quan he thong</h2>
    <!--h2 co class.section dung internal css viet sau nen se co color="purple"-->
    <h3 class="title">Courses</h3>
    <p class="highlight">Quan li khoa hoc</p>
    <h3 class="title">Students</h3>
    <p class="highlight">Quan li hoc vien</p>
    <h3 class="title">Teachers</h3>
    <p class="highlight">Quan li giang vien</p>
    <h3 class="title">Orders</h3>
    <p class="highlight">Quan li don hang</p>
    <h3 class="title">Reports</h3>
    <p class="highlight">Quan li thong ke</p>
    <!--h3 co class.title dung internal css viet sau nen se co color="aqua"-->
    <!--p co class.highlight dung internal css viet sau nen se co color="red"-->
</div>
</body>
</html>
